<!DOCTYPE html>

<style>
.hero{color:#fff;text-align:left;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;min-height:max(36vh,430px);padding:44px 24px;
  /* Aural Lab identity: BROWN hero (matches the hub card color);
     geometry = the HUB hero exactly (only the color changes between pages) */
  background:linear-gradient(135deg,#2b1a0c 0%,#6b4418 55%,#b07840 100%)}
.hero .inner{max-width:1060px;margin:0 auto;width:100%;position:relative;z-index:1;
  display:block;padding:0} /* al-header's flex-row header layout must not apply to the landing hero */
/* same diagonal piano-keys hero art as the hub and the other labs (overrides al-header's arc art) */

='129' x2='740' y2='129'/><line x1='20' y1='140' x2='740' y2='140'/></g><g fill='%23ffffff' fill-opacity='0.09' stroke='%23ffffff' stroke-opacity='0.09' stroke-width='2.2' transform='rotate(-6 400 130)'><ellipse cx='130' cy='108' rx='8' ry='5.6' transform='rotate(-18 130 108)'/><line x1='137' y1='106' x2='137' y2='72'/><ellipse cx='240' cy='130' rx='8' ry='5.6' transform='rotate(-18 240 130)'/><line x1='247' y1='128' x2='247' y2='94'/><ellipse cx='330' cy='96' rx='8' ry='5.6' transform='rotate(-18 330 96)'/><line x1='323' y1='98' x2='323' y2='132'/><ellipse cx='470' cy='118' rx='8' ry='5.6' transform='rotate(-18 470 118)'/><line x1='477' y1='116' x2='477' y2='82'/><ellipse cx='600' cy='104' rx='8' ry='5.6' transform='rotate(-18 600 104)'/><line x1='593' y1='106' x2='593' y2='140'/><ellipse cx='690' cy='126' rx='8' ry='5.6' transform='rotate(-18 690 126)'/><line x1='697' y1='124' x2='697' y2='90'/></g><g transform='rotate(-30 900 320)' mask='url(%23fade)'><rect x='470' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='519' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='568' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='617' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='666' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='715' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='764' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='813' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='862' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='911' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='960' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='1009' y='-30' width='46' height='360' rx='4' fill='url(%23wk)'/><rect x='503' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='552' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='650' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='699' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='748' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='846' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='895' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='993' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='1042' y='-30' width='29' height='215' rx='3.5' fill='url(%23bk)'/><rect x='460' y='-30' width='640' height='380' fill='url(%23amb)'/></g><rect width='900' height='260' fill='url(%23vig)'/></svg>") right center/cover no-repeat}
.hero .eyebrow{font-size:13.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.65);margin-bottom:10px}
.hero h1{font-size:2.4rem;font-weight:800;letter-spacing:-.6px;margin-bottom:6px}
.hero .tagline{font-size:1.5rem;font-weight:800;margin-bottom:12px;letter-spacing:-.3px}
.hero .tagline .c1{color:var(--gold)}.hero .tagline .c2{color:var(--pink)}
.hero .tagline .c3{color:var(--sky)}.hero .tagline .c4{color:#9ef0c0}
.mia-hero{position:absolute;right:6%;bottom:-12px;width:170px;z-index:1;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.30))}
@media(max-width:900px){.mia-hero{display:none}}
.hero h1::after{content:"";display:block;width:64px;height:5px;border-radius:3px;
  background:linear-gradient(90deg,var(--sky),var(--pink));margin:12px 0 0}
.hero p{max-width:600px;margin:0 0 24px;color:rgba(255,255,255,.88)}
.hero .btns{display:flex;gap:12px;justify-content:flex-start;flex-wrap:wrap;align-items:center}
/* language selector rides small at the end of the button row (moved there by
   the inline script below; Piano-style 3-button row + compact language pill) */
.hero .btns .lang-sel{font-size:12.5px;padding:7px 12px;margin-left:2px}
.hero .btns a{display:inline-block;background:var(--gold);color:var(--brand-dark);font-weight:800;
  padding:14px 30px;border-radius:9999px;box-shadow:0 6px 20px rgba(255,209,102,.35);
  transition:transform .12s,box-shadow .2s;text-decoration:none}
.hero .btns a:hover{background:#ffc247;transform:translateY(-2px)}
.hero .btns a.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.6);box-shadow:none}
main{max-width:1020px;margin:0 auto;padding:34px 24px 8px}
.how{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-top:0}
.how .card{text-align:center;margin-top:0;position:relative;overflow:hidden;padding-top:26px;
  transition:transform .14s,box-shadow .2s}
.how .card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px}
.how .card.s1::before{background:linear-gradient(90deg,var(--gold),var(--pink))}
.how .card.s2::before{background:linear-gradient(90deg,var(--pink),var(--primary))}
.how .card.s3::before{background:linear-gradient(90deg,var(--sky),var(--primary))}
.how .card:hover{transform:translateY(-4px);box-shadow:0 18px 44px rgba(0,55,112,.16)}
.how .ico{width:54px;height:54px;border-radius:14px;margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;font-size:28px}
.how .card.s1 .ico{background:#fff4d6}
.how .card.s2 .ico{background:#fdeffb}
.how .card.s3 .ico{background:#edf4ff}
.how h2{font-size:1.15rem;font-weight:800;color:var(--brand-dark)}
.how h2::after{content:"";display:block;width:42px;height:4px;border-radius:2px;margin:7px auto 0}
.how .card.s1 h2::after{background:linear-gradient(90deg,var(--gold),var(--pink))}
.how .card.s2 h2::after{background:linear-gradient(90deg,var(--pink),var(--primary))}
.how .card.s3 h2::after{background:linear-gradient(90deg,var(--sky),var(--primary))}
.how p{margin-top:10px;color:var(--muted);font-size:14px}
.wide{margin-top:18px;text-align:left}
footer{text-align:center;padding:26px 16px 44px;color:var(--muted);font-size:14px}
footer a{color:var(--primary);font-weight:600}
@media(max-width:640px){
  .hero{min-height:0;padding:48px 20px 56px}
  .hero h1{font-size:1.8rem}
  .hero .tagline{font-size:1.15rem}
  .hero .btns a{padding:12px 22px}
  main{padding-top:26px}
}
</style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
<div class="hero al-header">
  <div class="inner">
    <div class="eyebrow">🏠 <a href="https://miahlee90.github.io/" style="color:rgba(255,255,255,.9);text-decoration:none" title="Mia Music Studio home">Mia Music Studio</a> › Aural Lab</div>
    <h1>🎧 Aural Lab</h1>
    <p class="tagline" data-i18n-html="landing.tagline"></p>
    <p data-i18n="landing.lead"></p>
    <div class="btns">
      <a href="lessons/aural-u1-l1.html" data-i18n="landing.start"></a>
      <a class="ghost" href="lessons.html" data-i18n="toc.title"></a>
      <a class="ghost" href="student.html" data-i18n="nav.myProgress"></a>
    </div>
  </div>
  <svg class="mia-hero" viewBox="10 8 100 126" aria-hidden="true"><use href="#miaShape"/></svg>
</div>
<main>
  <div class="how">
    <div class="card s1"><div class="ico">👂</div><h2 data-i18n="landing.card.listen.t"></h2><p data-i18n="landing.card.listen.b"></p></div>
    <div class="card s2"><div class="ico">🎤</div><h2 data-i18n="landing.card.sing.t"></h2><p data-i18n="landing.card.sing.b"></p></div>
    <div class="card s3"><div class="ico">✍️</div><h2 data-i18n="landing.card.write.t"></h2><p data-i18n="landing.card.write.b"></p></div>
  </div>
  <div class="card wide">
    <h2 style="font-size:1.1rem;font-weight:800;color:var(--brand-dark)" data-i18n="landing.path.t"></h2>
    <p style="margin-top:8px;color:var(--muted);font-size:14px" data-i18n-html="landing.path.b"></p>
  </div>
  <div class="card wide">
    <h2 style="font-size:1.1rem;font-weight:800;color:var(--brand-dark)" data-i18n="landing.how.t"></h2>
    <p style="margin-top:8px;color:var(--muted);font-size:14px" data-i18n-html="landing.how.b"></p>
  </div>
</main>
<footer>
  <a href="student.html" data-i18n="footer.student"></a> &nbsp;·&nbsp;
  <a href="teacher.html" data-i18n="footer.teacher"></a>
</footer>
<script src="js/config.js?v=008"></script>
<script src="locales/en.js?v=008"></script>
<script src="locales/es.js?v=008"></script>
<script src="locales/ko.js?v=008"></script>
<script src="js/i18n.js?v=008"></script>
<script src="js/mia.js?v=008"></script>
<script>
ALI18N.apply(); ALMia.defs();
/* tuck the auto-mounted language selector into the hero button row */
window.addEventListener("DOMContentLoaded",function(){
  ALI18N.mountSwitcher();
  var s=document.getElementById("langSel"), b=document.querySelector(".hero .btns");
  if(s&&b) b.appendChild(s);
});
</script>
</body>
</html>
