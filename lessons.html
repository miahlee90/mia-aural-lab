<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Lessons · Aural Lab</title>
<link rel="stylesheet" href="css/style.css?v=004">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
<header class="al-header">
  <div class="inner">
    <nav class="crumbs">🏠 <a href="https://miahlee90.github.io/">Mia Music Studio</a> › <a href="index.html">Aural Lab</a> › <span data-i18n="toc.title">All Lessons</span></nav>
    <h1 id="appName"></h1>
    <span class="sub" data-i18n="app.subtitle"></span>
    <a class="hdr-link" href="student.html" data-i18n="nav.myProgress"></a>
    <a class="hdr-link" href="teacher.html" data-i18n="nav.instructor"></a>
  </div>
</header>
<main class="al-main">
  <div id="miaWelcome"></div>
  <div class="unit-cards" id="unitCards"></div>
  <div id="unitGroups"></div>
</main>
<script src="js/config.js?v=004"></script>
<script src="locales/en.js?v=004"></script>
<script src="locales/es.js?v=004"></script>
<script src="locales/ko.js?v=004"></script>
<script src="js/i18n.js?v=004"></script>
<script src="locales/curriculum.es.js?v=004"></script>
<script src="js/mia.js?v=004"></script>
<script src="js/curriculum.js?v=004"></script>
<script src="js/progress.js?v=004"></script>
<script src="js/lms.js?v=004"></script>
<script>
(function(){
  document.title=t("toc.title")+" · "+AL_CONFIG.APP_NAME;
  document.getElementById("appName").textContent=AL_CONFIG.APP_NAME;
  ALI18N.apply();
  ALMia.defs();

  const skillCls={"Rhythm":"sk-rhythm","Pitch":"","Solfège":"sk-solfege","Singing":"sk-singing",
    "Dictation":"sk-dictation","Harmony":"sk-harmony","Error Detection":"sk-error","Transcription":"sk-dictation"};
  const tSkill=s=>t("skill."+s);
  const tags=l=>l.skills.map(s=>`<span class="skill-tag ${skillCls[s]||""}">${tSkill(s)}</span>`).join("")+
    (l.track==="major"?` <span class="track-tag">${t("track.major")}</span>`:"");
  const LT=(l,f)=>AL_CURRICULUM.text(l,f), UT=(u,f)=>AL_CURRICULUM.unitText(u,f);

  const done=id=>ALProgress.status(id)==="completed";
  const started=id=>ALProgress.status(id)==="progress";

  /* Mia welcome */
  document.getElementById("miaWelcome").innerHTML=
    ALMia.strip("miaHello","mia-strip-sm");
  const readyCount=AL_CURRICULUM.lessons.filter(l=>l.status==="ready").length;
  ALMia.say("miaHello",t("toc.welcome",{r:readyCount,n:AL_CURRICULUM.lessons.length}));

  /* unit cards */
  const cards=AL_CURRICULUM.units.map(u=>{
    const ls=AL_CURRICULUM.unitLessons(u.unit);
    const dn=ls.filter(l=>done(l.id)).length;
    const pct=ls.length?Math.round(100*dn/ls.length):0;
    const ready=ls.filter(l=>l.status==="ready");
    const next=ls.find(l=>l.status==="ready"&&!done(l.id))||ready[0];
    const hasReady=ready.length>0;
    return `<div class="unit-card u${u.unit}${hasReady?"":" locked"}">
      <div class="u-num">${t("unit.label",{u:u.unit})}</div>
      <h3>${UT(u,"title")}</h3>
      <p>${UT(u,"desc")}</p>
      <div class="u-meta">${t("unit.meta",{n:ls.length,r:ready.length,d:dn})}</div>
      <div class="u-bar"><div class="u-fill" style="width:${pct}%"></div></div>
      ${hasReady
        ?`<a class="btn" href="${next.route}">${dn>0?t("unit.continue"):t("unit.start")} →</a>`
        :`<span class="btn">${t("unit.locked")}</span>`}
    </div>`;
  }).join("");
  document.getElementById("unitCards").innerHTML=cards;

  /* per-unit lesson lists */
  document.getElementById("unitGroups").innerHTML=AL_CURRICULUM.units.map(u=>{
    const ls=AL_CURRICULUM.unitLessons(u.unit);
    const dn=ls.filter(l=>done(l.id)).length;
    return `<div class="unit-group${u.unit===1?" open":""}">
      <div class="unit-head" onclick="this.parentElement.classList.toggle('open')">
        <span>${t("unit.label",{u:u.unit})} — ${UT(u,"title")}</span>
        <span class="uh-meta">${dn}/${ls.length} <span class="arr">▾</span></span>
      </div>
      <div class="unit-body">`+
      ls.map(l=>{
        const st=done(l.id)?`<span class="toc-done">✓ ${t("status.completed")}</span>`
               :started(l.id)?`<span class="toc-part">${t("status.progress")}</span>`:"";
        const pill=l.status==="ready"
          ?`<span class="pill-ready">${t("pill.ready")}</span>`:`<span class="pill-soon">${t("pill.planned")}</span>`;
        return `<a class="lesson-link" href="${l.route}">
          <span class="lnum">${l.num}</span>
          <span class="ttl">${LT(l,"title")}<small>${LT(l,"desc")}</small></span>
          <span class="tags">${tags(l)}</span> ${pill} ${st}</a>`;
      }).join("")+`</div></div>`;
  }).join("");
})();
</script>
</body>
</html>
